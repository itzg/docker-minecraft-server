services:
  mc:
    image: itzg/minecraft-server
    environment:
      EULA: true
      MODPACK_PLATFORM: AUTO_CURSEFORGE
      CF_SLUG: better-mc-fabric-bmc1
#      CF_FILENAME_MATCHER: v18.5
      MEMORY: 4G
    volumes:
      - mc:/data
    ports:
      - "25565:25565"

volumes:
  mc: {}